# Infra-only Docker Compose for hybrid local development.
# App services (fos-governance-service, fos-workspace-service, fos-gateway)
# run natively on the host via Maven.
# opensearch and onlyoffice are commented out to save RAM.
# Usage: docker compose -f docker-compose.infra.yml up -d

services:

  postgres:
    image: postgres:16.3
    container_name: fos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fos_governance
      POSTGRES_USER: fos
      POSTGRES_PASSWORD: fos
    volumes:
      - fos-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fos -d fos_governance"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0.12
    container_name: fos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - fos-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fos-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: on-failure

  redis:
    image: redis:7.2.5-alpine
    container_name: fos-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: fos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - fos-minio-data:/data

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: fos-keycloak
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fos_governance
      KC_DB_USERNAME: fos
      KC_DB_PASSWORD: fos
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy

  fos-opa-mock:
    image: nginx:alpine
    container_name: fos-opa-mock
    ports:
      - "8181:80"
    volumes:
      - ./opa-mock/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./opa-mock/allow.json:/usr/share/nginx/html/allow.json:ro

  # Disabled to reduce local RAM usage. Uncomment to re-enable.
