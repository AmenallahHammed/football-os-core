# This override is intentionally separate from application-dev.yml.
# Dev profiles are for host-run (localhost infra, mvn spring-boot:run).
# This file is for Docker-run with auth friction removed:
#   - Disables JWT in gateway and workspace
#   - Routes workspace policy checks to a local mock that always allows
#   - Does NOT disable auth in governance (intentional)
#   - Does NOT remove keycloak (it still starts from docker-compose.yml)
# Usage: docker compose -f docker-compose.yml -f docker-compose.noauth.yml up -d
version: "3.9"

services:

  fos-gateway:
    environment:
      FOS_SECURITY_ENABLED: "false"

  fos-workspace-service:
    environment:
      FOS_SECURITY_ENABLED: "false"
      FOS_POLICY_SERVICE_URL: "http://fos-opa-mock"

  fos-opa-mock:
    image: nginx:alpine
    container_name: fos-opa-mock
    ports:
      - "8181:80"
    volumes:
      - ./opa-mock/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./opa-mock/allow.json:/usr/share/nginx/html/allow.json:ro
