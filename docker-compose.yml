services:

  postgres:
    image: postgres:16.3
    container_name: fos-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fos_governance
      POSTGRES_USER: fos
      POSTGRES_PASSWORD: fos
    volumes:
      - fos-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fos -d fos_governance"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7.0.12
    container_name: fos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - fos-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fos-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fos-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: on-failure

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: fos-keycloak
    ports:
      - "8180:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fos_governance
      KC_DB_USERNAME: fos
      KC_DB_PASSWORD: fos
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:?KEYCLOAK_ADMIN is required}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/fos-realm.local.json:/opt/keycloak/data/import/fos-realm.local.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    container_name: fos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - fos-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  opa:
    image: openpolicyagent/opa:0.68.0
    container_name: fos-opa
    command:
      - run
      - --server
      - --addr=0.0.0.0:8181
      - /policies
    volumes:
      - ./fos-governance-service/src/main/resources/opa:/policies:ro

  opensearch:
    image: opensearchproject/opensearch:2.16.0
    container_name: fos-opensearch
    ports:
      - "9200:9200"
      - "9600:9600"
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?OPENSEARCH_INITIAL_ADMIN_PASSWORD is required}
      plugins.security.disabled: "true"
    volumes:
      - fos-opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7.2.5-alpine
    container_name: fos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  onlyoffice:
    image: onlyoffice/documentserver:9.3.1.2
    container_name: fos-onlyoffice
    ports:
      - "8084:80"
    environment:
      JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-true}
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET is required}
      JWT_HEADER: Authorization
      JWT_IN_BODY: "true"
      ALLOW_PRIVATE_IP_ADDRESS: ${ALLOW_PRIVATE_IP_ADDRESS:-true}
      ALLOW_META_IP_ADDRESS: ${ALLOW_META_IP_ADDRESS:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - fos-onlyoffice-data:/var/www/onlyoffice/Data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      default:
        aliases:
          - onlyoffice-documentserver

  fos-governance-service:
    build:
      context: .
      dockerfile: fos-governance-service/Dockerfile
    container_name: fos-governance-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8081
      POSTGRES_URL: jdbc:postgresql://postgres:5432/fos_governance
      POSTGRES_USER: ${POSTGRES_USER:-fos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fos}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/fos/protocol/openid-connect/certs
      OPA_URL: http://opa:8181
      CANONICAL_SERVICE_URL: http://fos-governance-service:8081
      KEYCLOAK_WEBHOOK_SECRET: ${KEYCLOAK_WEBHOOK_SECRET:?KEYCLOAK_WEBHOOK_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      opa:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - default

  fos-workspace-service:
    build:
      context: .
      dockerfile: fos-workspace-service/Dockerfile
    container_name: fos-workspace-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8082
      MONGODB_URI: mongodb://mongodb:27017/fos_workspace
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/fos/protocol/openid-connect/certs
      GOVERNANCE_URL: http://fos-governance-service:8081
      STORAGE_PROVIDER: minio
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-fos-workspace}
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:?ONLYOFFICE_DOCUMENT_SERVER_URL is required}
      ONLYOFFICE_PUBLIC_URL: ${ONLYOFFICE_PUBLIC_URL:?ONLYOFFICE_PUBLIC_URL is required}
      # CRITICAL: OnlyOffice container downloads files using this URL.
      # For Docker Desktop: use host.docker.internal (automatic, no env var needed)
      # For local LAN testing: set ONLYOFFICE_BACKEND_PUBLIC_URL=http://192.168.0.126:8080
      # For docker-in-docker or custom networks: use internal DNS name=http://fos-gateway:8080
      ONLYOFFICE_BACKEND_PUBLIC_URL: ${ONLYOFFICE_BACKEND_PUBLIC_URL:-http://host.docker.internal:8080}
      ONLYOFFICE_URL: ${ONLYOFFICE_URL:?ONLYOFFICE_URL is required}
      ONLYOFFICE_INTERNAL_URL: ${ONLYOFFICE_INTERNAL_URL:-http://onlyoffice-documentserver}
      ONLYOFFICE_CALLBACK_BASE_URL: ${ONLYOFFICE_CALLBACK_BASE_URL:-http://host.docker.internal:8080}
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?ONLYOFFICE_JWT_SECRET is required}
      ONLYOFFICE_JWT_ENABLED: ${ONLYOFFICE_JWT_ENABLED:-true}
      ONLYOFFICE_JWT_HEADER: Authorization
      ONLYOFFICE_JWT_IN_BODY: "true"
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      minio:
        condition: service_healthy
      onlyoffice:
        condition: service_healthy
      fos-governance-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8082/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - default

  fos-gateway:
    build:
      context: .
      dockerfile: fos-gateway/Dockerfile
    container_name: fos-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SERVER_PORT: 8080
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KEYCLOAK_JWKS_URI: http://keycloak:8080/realms/fos/protocol/openid-connect/certs
      GOVERNANCE_URL: http://fos-governance-service:8081
      WORKSPACE_URL: http://fos-workspace-service:8082
      FOS_SECURITY_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      fos-governance-service:
        condition: service_healthy
      fos-workspace-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - default

volumes:
  fos-pg-data:
  fos-mongo-data:
  fos-minio-data:
  fos-opensearch-data:
  fos-onlyoffice-data:

networks:
  default:
    name: fos-net
    driver: bridge
