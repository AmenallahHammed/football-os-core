server:
  port: 8080

spring:
  application:
    name: fos-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://localhost:8180/realms/fos/protocol/openid-connect/certs}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter:
              replenishRate: 100
              requestedTokens: 60
              burstCapacity: 100
            key-resolver: "#{@actorKeyResolver}"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never

fos:
  security:
    enabled: ${FOS_SECURITY_ENABLED:true}
  governance:
    url: ${GOVERNANCE_URL:http://localhost:8081}
