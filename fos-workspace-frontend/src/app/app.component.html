<div class="workspace-shell" [class.workspace-shell--full]="fullScreenRoute">
  @if (!fullScreenRoute) {
    <app-sidebar class="shell-sidebar"></app-sidebar>
  }

  <main class="shell-main" [class.shell-main--full]="fullScreenRoute">
    <div
      class="page-layer"
      [class.page-layer--full]="fullScreenRoute"
      [class.page-layer--flush]="fullHeightRoute"
      [@routeTransition]="routeAnimationState"
    >
      <router-outlet #outlet="outlet" (activate)="onOutletActivated(outlet)"></router-outlet>
    </div>
  </main>
</div>
