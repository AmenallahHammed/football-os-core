<a
  class="nav-item"
  [routerLink]="route"
  routerLinkActive
  #routerState="routerLinkActive"
  [routerLinkActiveOptions]="{ exact: exact }"
  [attr.aria-label]="label"
  [attr.title]="label"
  [class.is-active]="active || routerState.isActive"
>
  <app-workspace-calendar-icon class="icon" [name]="icon" [size]="18"></app-workspace-calendar-icon>

  @if (badge !== null && badge > 0) {
    <span class="badge">{{ badge }}</span>
  }
</a>
