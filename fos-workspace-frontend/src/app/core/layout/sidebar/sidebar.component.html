<aside class="sidebar">
  <header class="brand">
    <div class="logo">F</div>
    <div>
      <h1>Football OS</h1>
      <p>Workspace</p>
    </div>
  </header>

  <nav class="nav" aria-label="Main navigation">
    @for (item of navItems; track item.route) {
      <app-nav-item
        [label]="item.label"
        [route]="item.route"
        [icon]="item.icon"
        [exact]="item.exact"
        [badge]="item.badge ?? null"
      ></app-nav-item>
    }
  </nav>

  <footer class="sidebar-footer">
    <app-user-profile></app-user-profile>
  </footer>
</aside>
