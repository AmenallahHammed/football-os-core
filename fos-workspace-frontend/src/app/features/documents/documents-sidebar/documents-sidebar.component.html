<aside class="documents-sidebar">
  <nav class="section-nav" aria-label="Documents navigation">
    <div class="all-files-row" [class.active]="activeSection === 'all-files'">
      <button
        type="button"
        class="section-btn"
        [class.active]="activeSection === 'all-files'"
        (click)="selectRoot()"
      >
        All Files
      </button>
      <button
        type="button"
        class="expand-btn"
        [attr.aria-label]="allFilesExpanded ? 'Collapse folders' : 'Expand folders'"
        (click)="toggleTree($event)"
      >
        <span class="chevron" [class.open]="allFilesExpanded"></span>
      </button>
    </div>

    @if (allFilesExpanded) {
      <div class="folder-tree">
        <button
          type="button"
          class="tree-link"
          [class.active]="activeSection === 'all-files' && currentFolderId === null"
          (click)="selectRoot()"
        >
          WorkSpace
        </button>

        @for (folder of folderTree; track folder.id) {
          <button
            type="button"
            class="tree-link"
            [style.paddingLeft.px]="16 + folder.depth * 14"
            [class.active]="activeSection === 'all-files' && currentFolderId === folder.id"
            (click)="selectFolder(folder.id)"
          >
            {{ folder.name }}
          </button>
        }
      </div>
    }

    @for (section of primarySections; track section.id) {
      <button
        type="button"
        class="section-btn"
        [class.active]="activeSection === section.id"
        (click)="changeSection(section.id)"
      >
        {{ section.label }}
      </button>
    }
  </nav>

  <div class="deleted-slot">
    <button
      type="button"
      class="section-btn warning"
      [class.active]="activeSection === deletedSection.id"
      (click)="changeSection(deletedSection.id)"
    >
      {{ deletedSection.label }}
    </button>
  </div>
</aside>
