<section class="feature-page list-page">
  <header class="feature-header">
    <div class="feature-header-copy">
      <p class="feature-kicker">Team comms</p>
      <h1 class="feature-title">Inbox</h1>
      <p class="feature-subtitle">Board, scouting, and department communication stream.</p>
    </div>
    <button type="button" class="feature-button" (click)="markAllRead()">Mark all read</button>
  </header>

  <section class="feature-surface list-surface">
    <div class="list">
      @for (item of items; track item.id) {
        <app-notification-item [item]="item" (selected)="markRead($event)"></app-notification-item>
      }
    </div>

    @if (items.length === 0) {
      <p class="feature-empty">Inbox is clear.</p>
    }
  </section>
</section>
