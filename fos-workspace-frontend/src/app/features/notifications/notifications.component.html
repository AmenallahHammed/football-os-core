<section class="list-page">
  <header>
    <div>
      <h1>Notifications</h1>
      <p>Operational alerts and workflow updates.</p>
    </div>
    <button type="button" (click)="markAllRead()">Mark all read</button>
  </header>

  <div class="list">
    @for (item of items; track item.id) {
      <app-notification-item [item]="item" (selected)="markRead($event)"></app-notification-item>
    }
  </div>
</section>
