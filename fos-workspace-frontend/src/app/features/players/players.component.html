<section class="feature-page players-page">
  <header class="feature-header">
    <div class="feature-header-copy">
      <p class="feature-kicker">Squad overview</p>
      <h1 class="feature-title">Players</h1>
      <p class="feature-subtitle">Browse squad members, filter roles, and open player records from a single roster view.</p>
    </div>
  </header>

  <section class="feature-surface players-controls">
    <div class="toolbar">
      <input class="feature-control" type="search" placeholder="Search player" [(ngModel)]="searchTerm" />
      <select class="feature-control" [(ngModel)]="selectedPosition">
        <option value="ALL">All Positions</option>
        <option value="GK">GK</option>
        <option value="DEF">DEF</option>
        <option value="MID">MID</option>
        <option value="FWD">FWD</option>
      </select>
    </div>

    <p class="results-copy">{{ players.length }} players visible</p>
  </section>

  <div class="card-grid">
    @for (player of players; track player.id) {
      <app-player-card [player]="player" (selected)="openProfile($event)"></app-player-card>
    }
  </div>
</section>
