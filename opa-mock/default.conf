server {
    listen 80;

    location /api/v1/policy/evaluate {
        default_type application/json;
        return 200 '{"decision":"ALLOW","reason":"allowed"}';
    }

    location /v1/data/fos/allow {
        default_type application/json;
        return 200 '{"result": true}';
    }

    location / {
        default_type application/json;
        return 200 '{"result": true}';
    }
}
